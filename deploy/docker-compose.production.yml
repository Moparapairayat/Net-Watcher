services:
  netwatcher:
    build:
      context: ..
      dockerfile: Dockerfile
    image: netwatcher:production
    restart: unless-stopped
    depends_on:
      - timescaledb
      - redis
      - minio
    ports:
      - "8080:8080"
    environment:
      NETWATCHER_LISTEN: 0.0.0.0:8080
      NETWATCHER_STATIC_DIR: /app/web
      NETWATCHER_DB_DSN: postgres://netwatcher:${POSTGRES_PASSWORD}@timescaledb:5432/netwatcher?sslmode=disable
      NETWATCHER_TIMESCALE: "true"
      NETWATCHER_DB_BATCH: "250"
      NETWATCHER_DB_FLUSH: 1s
      NETWATCHER_DB_RETENTION: 720h
      NETWATCHER_DB_CLEANUP: 1h
      NETWATCHER_DB_MAX_OPEN: "25"
      NETWATCHER_DB_MAX_IDLE: "10"
      NETWATCHER_DB_CONN_MAX_LIFETIME: 30m
      NETWATCHER_REDIS_ADDR: redis:6379
      NETWATCHER_REDIS_DB: "0"
      NETWATCHER_REDIS_PREFIX: netwatcher
      NETWATCHER_REDIS_CACHE_TTL: 3s
      NETWATCHER_S3_ENDPOINT: minio:9000
      NETWATCHER_S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      NETWATCHER_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      NETWATCHER_S3_BUCKET: netwatcher-artifacts
      NETWATCHER_S3_REGION: us-east-1
      NETWATCHER_S3_PREFIX: production
      NETWATCHER_S3_SSL: "false"
    cap_add:
      - NET_RAW

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: netwatcher
      POSTGRES_USER: netwatcher
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - timescaledb-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  timescaledb-data:
  redis-data:
  minio-data:

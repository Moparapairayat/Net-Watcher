name: CI

on:
  push:
    branches:
      - main
      - feat/**
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Go test
        run: go test ./...

      - name: Go vet
        run: go vet ./...

  backend-race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Go race test
        run: go test -race ./cmd/netwatcher ./internal/store ./internal/portscan ./internal/dnslookup

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

  docker-smoke:
    runs-on: ubuntu-latest
    needs:
      - backend
      - backend-race
      - frontend
    steps:
      - uses: actions/checkout@v4

      - name: Write CI env file
        shell: bash
        run: |
          cat > .env.ci <<'EOF'
          POSTGRES_PASSWORD=ci-postgres-password
          MINIO_ROOT_USER=minioadmin
          MINIO_ROOT_PASSWORD=ci-minio-password
          NETWATCHER_PUBLIC_BASE_URL=http://127.0.0.1:8080
          NETWATCHER_ALLOWED_ORIGINS=http://127.0.0.1:8080,http://localhost:8080
          NETWATCHER_RESEND_API_KEY=
          NETWATCHER_EMAIL_FROM=NetWatcher <onboarding@example.com>
          NETWATCHER_EMAIL_REPLY_TO=support@example.com
          EOF

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Start stack
        run: docker compose -f deploy/docker-compose.production.yml --env-file .env.ci up -d --build

      - name: Wait for health
        shell: bash
        run: |
          for i in {1..40}; do
            if curl -fsS http://127.0.0.1:8080/healthz >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "Health check did not become ready" >&2
          docker compose -f deploy/docker-compose.production.yml --env-file .env.ci logs
          exit 1

      - name: HTTP smoke test
        shell: pwsh
        run: ./scripts/smoke-test.ps1 -BaseUrl 'http://127.0.0.1:8080'

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm --dir frontend exec playwright install --with-deps chromium

      - name: Run Playwright E2E
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:8080
        run: pnpm --dir frontend test:e2e

      - name: Show logs on failure
        if: failure()
        run: docker compose -f deploy/docker-compose.production.yml --env-file .env.ci logs --tail 200

      - name: Stop stack
        if: always()
        run: docker compose -f deploy/docker-compose.production.yml --env-file .env.ci down -v
